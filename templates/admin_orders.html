<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samarkand Bakery — Orders Admin</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0eb;
            color: #2c2c2c;
        }

        header {
            background: #1e2a4a;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header img { height: 50px; width: 50px; border-radius: 50%; border: 2px solid #b8860b; }
        header h1 { font-size: 1.3em; }
        header span { font-size: 0.85em; opacity: 0.7; }

        .nav-links {
            margin-left: auto;
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
            font-size: 0.9em;
        }

        .nav-links a:hover { opacity: 1; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* Filters */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 18px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
        }

        .filter-btn.active { background: #1e2a4a; color: white; border-color: #1e2a4a; }

        /* Stats */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }

        .stat-card .number { font-size: 1.5em; font-weight: 700; color: #1e2a4a; }
        .stat-card .label { font-size: 0.8em; color: #888; margin-top: 3px; }

        /* Order cards */
        .order-card {
            background: white;
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            cursor: pointer;
            gap: 10px;
        }

        .order-header:hover { background: #fafafa; }

        .order-id { font-weight: 700; color: #1e2a4a; font-size: 1.05em; }
        .order-customer { color: #555; font-size: 0.9em; }
        .order-time { color: #999; font-size: 0.82em; }
        .order-amount { font-weight: 700; color: #b8860b; font-size: 1.05em; }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.78em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-completed { background: #d1ecf1; color: #0c5460; }
        .status-cancelled { background: #f8d7da; color: #721c24; }

        .order-details {
            display: none;
            padding: 0 18px 18px;
            border-top: 1px solid #f0f0f0;
        }

        .order-details.visible { display: block; }

        .detail-section {
            margin-top: 12px;
        }

        .detail-section h4 {
            font-size: 0.85em;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 6px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.9em;
        }

        .detail-row .label { color: #666; }
        .detail-row .value { font-weight: 500; }
        .profit { color: #2e7d32; }
        .loss { color: #c62828; }

        .status-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .status-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
        }

        .status-btn.confirm { background: #d4edda; color: #155724; }
        .status-btn.complete { background: #d1ecf1; color: #0c5460; }
        .status-btn.cancel { background: #f8d7da; color: #721c24; }
        .status-btn:hover { opacity: 0.8; }

        #detail-map {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            margin-top: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h3 { margin-bottom: 8px; }
    </style>
</head>
<body>

<header>
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
    <div>
        <h1>SAMARKAND BAKERY</h1>
        <span>Orders Admin</span>
    </div>
    <div class="nav-links">
        <a href="/">Costing Tool</a>
        <a href="/order">Order Page</a>
    </div>
</header>

<div class="container">

    <div class="stats-bar" id="stats-bar">
        <div class="stat-card"><div class="number" id="stat-total">0</div><div class="label">Total Orders</div></div>
        <div class="stat-card"><div class="number" id="stat-pending">0</div><div class="label">Pending</div></div>
        <div class="stat-card"><div class="number" id="stat-revenue">0</div><div class="label">Revenue (MAD)</div></div>
        <div class="stat-card"><div class="number" id="stat-profit">0</div><div class="label">Profit (MAD)</div></div>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterOrders(null, this)">All</button>
        <button class="filter-btn" onclick="filterOrders('pending', this)">Pending</button>
        <button class="filter-btn" onclick="filterOrders('confirmed', this)">Confirmed</button>
        <button class="filter-btn" onclick="filterOrders('completed', this)">Completed</button>
        <button class="filter-btn" onclick="filterOrders('cancelled', this)">Cancelled</button>
    </div>

    <div id="orders-list"></div>

</div>

<script>
    let allOrders = [];
    let detailMaps = {};

    async function loadOrders(status) {
        let url = '/api/admin/orders';
        if (status) url += '?status=' + status;
        const res = await fetch(url);
        allOrders = await res.json();
        renderOrders(allOrders);
        updateStats(allOrders);
    }

    function updateStats(orders) {
        document.getElementById('stat-total').textContent = orders.length;
        document.getElementById('stat-pending').textContent = orders.filter(o => o.status === 'pending').length;

        const revenue = orders.filter(o => o.status !== 'cancelled').reduce((s, o) => s + (o.total_price || 0), 0);
        const profit = orders.filter(o => o.status !== 'cancelled').reduce((s, o) => s + (o.total_profit || 0), 0);
        document.getElementById('stat-revenue').textContent = revenue.toFixed(0);
        document.getElementById('stat-profit').textContent = profit.toFixed(0);
    }

    function renderOrders(orders) {
        const container = document.getElementById('orders-list');

        if (orders.length === 0) {
            container.innerHTML = '<div class="empty-state"><h3>No orders yet</h3><p>Orders will appear here when customers place them.</p></div>';
            return;
        }

        let html = '';
        for (const order of orders) {
            const statusClass = 'status-' + order.status;
            const profitClass = (order.total_profit || 0) >= 0 ? 'profit' : 'loss';
            const time = new Date(order.created_at).toLocaleString();

            html += `<div class="order-card">
                <div class="order-header" onclick="toggleOrder(${order.id})">
                    <span class="order-id">#${order.id}</span>
                    <span class="order-customer">${order.customer_name}</span>
                    <span class="order-time">${time}</span>
                    <span class="order-amount">${(order.total_price || 0).toFixed(2)} MAD</span>
                    <span class="status-badge ${statusClass}">${order.status}</span>
                </div>
                <div class="order-details" id="details-${order.id}">
                    <div class="detail-section">
                        <h4>Customer</h4>
                        <div class="detail-row"><span class="label">Name</span><span class="value">${order.customer_name}</span></div>
                        <div class="detail-row"><span class="label">Phone</span><span class="value">${order.customer_phone}</span></div>
                        <div class="detail-row"><span class="label">Type</span><span class="value">${order.delivery_type === 'delivery' ? 'Delivery' : 'Pickup (Wilaya Centre)'}</span></div>
                        ${order.delivery_address ? `<div class="detail-row"><span class="label">Address</span><span class="value">${order.delivery_address}</span></div>` : ''}
                        ${order.notes ? `<div class="detail-row"><span class="label">Notes</span><span class="value">${order.notes}</span></div>` : ''}
                    </div>

                    ${order.delivery_lat ? `<div class="detail-section"><h4>Delivery Location</h4><div id="map-${order.id}" style="width:100%;height:200px;border-radius:8px;"></div></div>` : ''}

                    <div class="detail-section">
                        <h4>Items</h4>
                        ${order.items.map(i => `<div class="detail-row"><span class="label">${i.name} x${i.quantity}</span><span class="value">${(i.subtotal || 0).toFixed(2)} MAD</span></div>`).join('')}
                    </div>

                    <div class="detail-section">
                        <h4>Financials</h4>
                        <div class="detail-row"><span class="label">Revenue</span><span class="value">${(order.total_price || 0).toFixed(2)} MAD</span></div>
                        <div class="detail-row"><span class="label">Cost</span><span class="value">${(order.total_cost || 0).toFixed(2)} MAD</span></div>
                        <div class="detail-row"><span class="label">Profit</span><span class="value ${profitClass}">${(order.total_profit || 0).toFixed(2)} MAD</span></div>
                    </div>

                    <div class="status-actions">
                        ${order.status === 'pending' ? '<button class="status-btn confirm" onclick="changeStatus(' + order.id + ', \'confirmed\')">Confirm</button>' : ''}
                        ${order.status === 'confirmed' ? '<button class="status-btn complete" onclick="changeStatus(' + order.id + ', \'completed\')">Complete</button>' : ''}
                        ${order.status !== 'cancelled' && order.status !== 'completed' ? '<button class="status-btn cancel" onclick="changeStatus(' + order.id + ', \'cancelled\')">Cancel</button>' : ''}
                    </div>
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }

    function toggleOrder(id) {
        const details = document.getElementById('details-' + id);
        details.classList.toggle('visible');

        // Init map for delivery orders
        const order = allOrders.find(o => o.id === id);
        if (order && order.delivery_lat && details.classList.contains('visible') && !detailMaps[id]) {
            setTimeout(() => {
                const mapEl = document.getElementById('map-' + id);
                if (mapEl) {
                    const m = L.map(mapEl).setView([order.delivery_lat, order.delivery_lng], 16);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap'
                    }).addTo(m);
                    L.marker([order.delivery_lat, order.delivery_lng]).addTo(m);
                    detailMaps[id] = m;
                }
            }, 100);
        }
    }

    async function changeStatus(id, status) {
        await fetch(`/api/admin/orders/${id}/status`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status })
        });
        loadOrders();
    }

    function filterOrders(status, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadOrders(status);
    }

    // Load on start
    loadOrders();

    // Auto-refresh every 30 seconds
    setInterval(() => loadOrders(), 30000);
</script>

</body>
</html>
